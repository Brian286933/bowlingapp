<!DOCTYPE html>
<html>
<head>

<title>AI Bowling Game</title>

<style>

body{
    background:#1a1a1a;
    color:white;
    text-align:center;
    font-family:Arial;
}

img{
    width:700px;
    margin-top:20px;
}

input{
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    background:orange;
    border:none;
}

table{
    margin:auto;
    margin-top:20px;
}

td,th{
    padding:10px;
    border:1px solid white;
}

</style>

</head>

<body>

<h1>🎳 AI Bowling Game</h1>

<img src="{{ url_for('static', filename='bowling_lane.jpg') }}">

<h2>Round {{round}}</h2>

<form method="POST">

<input type="number" name="first" placeholder="First throw" required>

<input type="number" name="second" placeholder="Second throw" required>

<br>

<button type="submit">Roll Ball</button>

</form>

{% if result %}
<h2>Result: {{result}}</h2>
{% endif %}

<h2>Scoreboard</h2>

<table>

<tr>
<th>Round</th>
<th>First</th>
<th>Second</th>
<th>Result</th>
</tr>

{% for r in scores %}

<tr>
<td>{{r[0]}}</td>
<td>{{r[1]}}</td>
<td>{{r[2]}}</td>
<td>{{r[3]}}</td>
</tr>

{% endfor %}

</table>

<h2>Total Score: {{total}}</h2>

{% if explanation %}

<h2>🎤 Game Narrator</h2>

<p style="width:600px;margin:auto;">
{{ explanation }}
</p>

{% endif %}

</body>
</html>
