<!DOCTYPE html>
<html>
<head>
<title>Bowling AI Game</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>🎳 AI Bowling Game</h1>

<h2>Round {{round}}</h2>

<form method="POST">

<input name="first" type="number" placeholder="First throw" required>

<input name="second" type="number" placeholder="Second throw" required>

<button type="submit">Submit</button>

</form>

{% if result %}
<h3>Result: {{result}}</h3>
{% endif %}

<h3>Score History</h3>

<ul>
{% for r in scores %}
<li>Round {{r[0]}} : {{r[3]}} ({{r[1]}},{{r[2]}})</li>
{% endfor %}
</ul>

{% if explanation %}
<h2>AI Game Explanation</h2>
<p>{{explanation}}</p>
{% endif %}

</body>
</html>
